spring:
  application:
    name: yu-ai-agent
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/yu_ai_agent
    username: postgres
    password: 123456
  ai:
    dashscope:
      # 从环境变量读取，启动时设置：export DASHSCOPE_API_KEY=sk-xxx
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-max
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:1b
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 5s
  # 修复：mcp 应在 spring 下，不能放在 spring.data 下
  ai:
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json
#    sse:
#      connections:
#        server1:
#          url: http://localhost:8127
#  vectorstore:
#    pgvector:
#      index-type: HNSW
#      dimensions: 1536
#      distance-type: COSINE_DISTANCE
#      max-document-batch-size: 10000

server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yupi.yuaiagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

# 从环境变量读取，启动时设置：export SEARCH_API_KEY=xxx
search-api:
  api-key: ${SEARCH_API_KEY}

logging:
  level:
    org.springframework.ai: DEBUG
